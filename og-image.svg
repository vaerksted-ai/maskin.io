<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111110"/>

  <!-- Subtle grid texture -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FFFFFF" stroke-width="0.4" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo mark -->
  <svg x="80" y="80" width="72" height="72" viewBox="0 0 80 80">
    <rect width="80" height="80" rx="14" fill="#1C1B18"/>
    <path d="M17 60 L17 20 L40 46 L63 20 L63 60" stroke="#FAFAF8" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  </svg>

  <!-- Wordmark -->
  <text x="166" y="133" font-family="'Schibsted Grotesk', 'Arial', sans-serif" font-size="36" font-weight="700" fill="#FAFAF8" letter-spacing="-0.02em">Maskin</text>

  <!-- Main headline -->
  <text font-family="'Schibsted Grotesk', 'Arial', sans-serif" font-weight="700" fill="#FAFAF8" letter-spacing="-0.03em">
    <tspan x="80" y="310" font-size="80">Your team has been</tspan>
    <tspan x="80" dy="96" font-size="80">using AI </tspan><tspan font-size="80" fill="#2563EB">alone.</tspan>
  </text>

  <!-- Subline -->
  <text x="80" y="480" font-family="'Schibsted Grotesk', 'Arial', sans-serif" font-size="28" fill="#9B958F" font-weight="400">
    The workspace where humans and AI agents work together.
  </text>

  <!-- Bottom tags -->
  <rect x="80" y="540" width="140" height="40" rx="20" fill="#1C1B18"/>
  <text x="150" y="566" font-family="'Schibsted Grotesk', 'Arial', sans-serif" font-size="16" fill="#9B958F" text-anchor="middle" font-weight="600">Open source</text>

  <rect x="232" y="540" width="150" height="40" rx="20" fill="#1C1B18"/>
  <text x="307" y="566" font-family="'Schibsted Grotesk', 'Arial', sans-serif" font-size="16" fill="#9B958F" text-anchor="middle" font-weight="600">MCP-native</text>

  <rect x="394" y="540" width="120" height="40" rx="20" fill="#1C1B18"/>
  <text x="454" y="566" font-family="'Schibsted Grotesk', 'Arial', sans-serif" font-size="16" fill="#9B958F" text-anchor="middle" font-weight="600">Self-host</text>

  <!-- Domain -->
  <text x="1120" y="570" font-family="'Schibsted Grotesk', 'Arial', sans-serif" font-size="22" fill="#5A5751" text-anchor="end" font-weight="500">maskin.io</text>
</svg>
