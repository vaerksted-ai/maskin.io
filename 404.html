<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --ink: #111110; --surface: #FAFAF8; --accent: #B5311A; --ink-3: #9B958F; }

    font-family: 'Schibsted Grotesk', sans-serif;

  .logo {

    font-size: 1rem; font-weight: 700; letter-spacing: -.02em;

  }
  h1 { font-size: 4rem; font-weight: 700; letter-spacing: -.04em; color: var(--accent); line-height: 1; }
  p { margin-top: 1rem; color: var(--ink-3); font-size: .9375rem; }
  a.home { display: inline-block; margin-top: 2rem; font-weight: 600; font-size: .875rem; color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="logo" href="/">
      <svg width="28" height="28" viewBox="0 0 80 80" fill="none">
        <rect width="80" height="80" rx="14" fill="#111110"/>
